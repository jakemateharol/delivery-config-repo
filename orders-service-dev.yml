server:
  port: 8081

spring:
  application:
    name: orders-service
  datasource:
    url: jdbc:mysql://localhost:3304/orders_db_dev
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
